name: build-artifacts

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build .exe
        shell: pwsh
        run: ./scripts/build_exe.ps1

      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: horloge-exe
          path: dist/horloge.exe
          if-no-files-found: error

  build-linux-appimage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build AppImage
        run: |
          chmod +x scripts/build_onefile.sh scripts/build_appimage.sh
          ./scripts/build_appimage.sh

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: horloge-appimage
          path: dist/Horloge-x86_64.AppImage
          if-no-files-found: error

  release:
    needs: [build-windows-exe, build-linux-appimage]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: horloge-*
          merge-multiple: true
          path: release-assets

      - name: Verify release assets
        run: ls -lah release-assets/

      - name: Publish release assets
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true
          tag: latest
          commit: main
          name: Latest build
          body: |
            Binaires generes automatiquement depuis le commit `${{ github.sha }}`.

            - Windows : `horloge.exe`
            - Linux : `Horloge-x86_64.AppImage`
          artifacts: release-assets/horloge.exe,release-assets/Horloge-x86_64.AppImage
          artifactContentType: application/octet-stream
          makeLatest: true

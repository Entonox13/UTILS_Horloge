name: build-artifacts

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build .exe
        shell: pwsh
        run: ./scripts/build_exe.ps1

      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: horloge-exe
          path: dist/horloge.exe
          if-no-files-found: error

  build-linux-appimage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build AppImage
        run: |
          chmod +x scripts/build_onefile.sh scripts/build_appimage.sh
          ./scripts/build_appimage.sh

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: horloge-appimage
          path: dist/Horloge-x86_64.AppImage
          if-no-files-found: error
